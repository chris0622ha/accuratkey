name: Notify Studio

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    # Only fire every 2 pushes by checking if push count is even
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10
      - name: Check push count and notify studio
        env:
          PAT_TOKEN: ${{ secrets.STUDIO_PAT }}
        run: |
          # Count commits since last studio-notify tag, trigger every 2
          LAST_TAG=$(git tag -l "studio-notified-*" | sort -V | tail -1)
          if [ -z "$LAST_TAG" ]; then
            COUNT=2
          else
            COUNT=$(git rev-list ${LAST_TAG}..HEAD --count)
          fi
          echo "Commits since last notify: $COUNT"
          if [ "$COUNT" -ge 2 ]; then
            MSG=$(git log -1 --pretty=format:"%s")
            SHA=$(git rev-parse --short HEAD)
            # Tag this commit so next run counts from here
            git config user.email "bot@accuratkey"
            git config user.name "Notify Bot"
            git tag "studio-notified-$(date +%s)"
            git push origin --tags 2>/dev/null || true
            # Trigger studio repo dispatch
            curl -s -X POST \
              -H "Authorization: token $PAT_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/chris0622ha/studio/dispatches \
              -d "{\"event_type\":\"accuratkey-push\",\"client_payload\":{\"app\":\"AccuratKey\",\"message\":\"$MSG\",\"sha\":\"$SHA\"}}"
            echo "Notified studio"
          else
            echo "Only $COUNT commit(s) — waiting for 2"
          fi
