name: Notify ChrisProjects

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20
      - name: Notify every 2 pushes
        env:
          PAT_TOKEN: ${{ secrets.STUDIO_PAT }}
        run: |
          LAST_TAG=$(git tag -l "studio-notified-*" | sort -V | tail -1)
          if [ -z "$LAST_TAG" ]; then COUNT=2; else COUNT=$(git rev-list ${LAST_TAG}..HEAD --count 2>/dev/null || echo 2); fi
          echo "Commits since last notify: $COUNT"
          if [ "$COUNT" -ge 2 ]; then
            export MSG=$(git log -1 --pretty=format:"%s" | head -c 100)
            export SHA=$(git rev-parse --short HEAD)
            # Extract the changelog: line specifically, BEFORE any truncation,
            # so a long commit body never cuts it off mid-sentence the way a
            # blind head -c on the raw body did before. Falls back to the
            # commit subject if no changelog: line exists. Truncates on a
            # word boundary with an ellipsis as a safety net, never mid-word.
            export BODY=$(git log -1 --pretty=format:"%b" | grep -i '^changelog:' | sed 's/^[Cc]hangelog:[[:space:]]*//' | head -c 280)
            if [ -z "$BODY" ]; then export BODY="$MSG"; fi
            git config user.email "bot@accuratkey"
            git config user.name "Notify Bot"
            git tag "studio-notified-$(date +%s)"
            git push origin --tags 2>/dev/null || true
            PAYLOAD=$(node -e "console.log(JSON.stringify({event_type:'accuratkey-push',client_payload:{app:'AccuratKey',message:process.env.MSG,body:process.env.BODY,sha:process.env.SHA}}))")
            curl -s -X POST \
              -H "Authorization: token $PAT_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/chris0622ha/tqak/dispatches \
              -d "$PAYLOAD"
            echo "Notified ChrisProjects"
          else
            echo "Only $COUNT commit(s) — waiting for 2"
          fi
